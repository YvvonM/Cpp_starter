name: RaptorReview AI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dev-k99/raptorreview-ai@v1
        with:
          groq_api_key: ${{ secrets.GROQKEY }}
          
