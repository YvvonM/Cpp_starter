name: RaptorReview AI

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dev-k99/raptorreview-ai@v1
        with:
          groq_api_key: ${{ secrets.GROQKEY }}
          custom_prompt: |
            You are reviewing C++ code. Focus on:
            - Memory safety (leaks, dangling pointers, RAII)
            - Undefined behavior (signed overflow, strict aliasing)
            - Modern C++ best practices (smart pointers, move semantics, constexpr)
            - Thread safety and data races
            - Performance pitfalls (unnecessary copies, virtual in hot paths)
            Be concise. Only comment on actual issues, not style nits.

            Respond with ONLY a valid JSON array, no markdown, no freeform text.
            Each element must use this exact schema:
            {
              "file": "path/to/file",
              "line": 123,
              "severity": "CRITICAL" | "WARNING" | "SUGGESTION",
              "title": "short issue title",
              "suggestion": "concrete fix",
              "why": "impact explanation"
            }
